name: Backend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - "app/**"
              - "pyproject.toml"
              - "requirements.txt"
              - ".github/workflows/backend-ci.yml"

      - name: Skip docs-only changes
        if: steps.filter.outputs.backend != 'true'
        run: echo "No backend changes detected; skipping lint and tests."

      - name: Set up Python
        if: steps.filter.outputs.backend == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.filter.outputs.backend == 'true'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint
        if: steps.filter.outputs.backend == 'true'
        run: ruff check app

      - name: Format check
        if: steps.filter.outputs.backend == 'true'
        run: black --check app

      - name: Run tests
        if: steps.filter.outputs.backend == 'true'
        run: pytest app/backend/tests -q
